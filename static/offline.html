<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Today OS is offline</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#202020" />
		<style>
			:root {
				color-scheme: dark;
				--bg: #191919;
				--surface-1: #202020;
				--border-subtle: #2e2e2e;
				--text-primary: #ededef;
				--text-secondary: #a1a1aa;
				--accent: #38bdf8;
				--radius-lg: 12px;
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}

			html,
			body {
				margin: 0;
				min-height: 100%;
				background: var(--bg);
				color: var(--text-primary);
				font-family:
					Inter,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					sans-serif;
			}

			body {
				display: grid;
				place-items: center;
				padding: 24px;
			}

			main {
				width: min(100%, 420px);
				border: 1px solid var(--border-subtle);
				border-radius: var(--radius-lg);
				background: var(--surface-1);
				padding: 24px;
				box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
			}

			.brand {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 20px;
				font-size: 15px;
				font-weight: 600;
			}

			.brand img {
				width: 28px;
				height: 28px;
				border-radius: 8px;
			}

			h1 {
				margin: 0 0 8px;
				font-size: 24px;
				line-height: 1.2;
				font-weight: 600;
				letter-spacing: -0.01em;
			}

			p {
				margin: 0;
				color: var(--text-secondary);
				font-size: 14px;
				line-height: 1.5;
			}

			a {
				display: inline-flex;
				margin-top: 20px;
				color: var(--accent);
				font-size: 14px;
				font-weight: 500;
				text-decoration: none;
			}
		</style>
	</head>
	<body>
		<main>
			<div class="brand">
				<img src="/icon-192.png" alt="" />
				<span>Today OS</span>
			</div>
			<h1>You are offline</h1>
			<p>Reconnect to load your latest todos, habits, notes, calendar, and jobs.</p>
			<a href="/today">Try Today again</a>
		</main>
	</body>
</html>
