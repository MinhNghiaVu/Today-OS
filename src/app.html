<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Today OS</title>
		<meta
			name="description"
			content="A focused daily operating system for todos, habits, notes, calendar, and jobs."
		/>
		<meta name="application-name" content="Today OS" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="dark light" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#202020" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafafa" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Today OS" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black" />
		<meta name="format-detection" content="telephone=no" />
		<script>
			(function () {
				var root = document.documentElement;
				var accents = [
					['#38bdf8', '#0ea5e9', '#0284c7'],
					['#14b8a6', '#0d9488', '#0f766e'],
					['#6366f1', '#4f52d4', '#4338ca'],
					['#8b5cf6', '#7c3aed', '#6d28d9'],
					['#f59e0b', '#d97706', '#b45309'],
					['#f43f5e', '#e11d48', '#be123c']
				];

				function cookie(name) {
					var match = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]+)'));
					return match ? decodeURIComponent(match[1]) : null;
				}

				var storedTheme = null;
				var storedAccent = null;
				try {
					storedTheme = localStorage.getItem('today-os-theme');
					storedAccent = localStorage.getItem('today-os-accent-index');
				} catch (e) {}

				var theme =
					storedTheme ||
					cookie('theme') ||
					(window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
				var accentIndex = Number(storedAccent || cookie('accentIndex') || 0);
				var accent = accents[accentIndex] || accents[0];

				root.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
				root.style.colorScheme = theme === 'light' ? 'light' : 'dark';
				root.style.setProperty('--accent', accent[0]);
				root.style.setProperty('--accent-hover', accent[1]);
				root.style.setProperty('--accent-pressed', accent[2]);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
